<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shaik Zaheer Abbas — SAP Learning Log</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --glass: rgba(255,255,255,0.06);
    --glass-strong: rgba(255,255,255,0.10);
    --glass-border: rgba(255,255,255,0.12);
    --ink: #F4F5F7;
    --ink-soft: #9A9DA6;
    --ink-faint: #64666F;
    --accent: #4A6CF7;
    --accent-2: #A25BF0;
    --accent-3: #FF6FA5;
    --accent-4: #22C1A0;
    --danger: #FF5C4D;
    --bg: #060607;
    --bg-elevated: #0E0E10;
    --radius-lg: 26px;
    --radius-md: 16px;
    --radius-sm: 11px;
    --font-display: 'Space Grotesk', -apple-system, system-ui, sans-serif;
    --font-body: 'Manrope', -apple-system, system-ui, sans-serif;
    --font-mono: 'SF Mono', ui-monospace, Menlo, Consolas, monospace;
    --sidebar-w: 268px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; font-family:var(--font-body); color:var(--ink); background:var(--bg);
    -webkit-font-smoothing:antialiased;
  }
  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background: rgba(255,255,255,0.15); border-radius:8px; }
  a{ color:inherit; }
  [contenteditable="true"]{ outline:none; border-radius:6px; transition:background .15s; }
  [contenteditable="true"]:hover{ background: rgba(255,255,255,0.05); }
  [contenteditable="true"]:focus{ background: rgba(74,108,247,0.10); box-shadow:0 0 0 1.5px var(--accent); }
  .glass{ background: var(--glass); backdrop-filter: blur(18px); border:1px solid var(--glass-border); border-radius: var(--radius-md); }
  .glass-strong{ background: var(--glass-strong); backdrop-filter: blur(22px); border:1px solid var(--glass-border); border-radius: var(--radius-lg); }

  /* ---------------- Background ---------------- */
  .bg-scene{ position:fixed; inset:0; z-index:-1; overflow:hidden; background:#050506; }
  .blob{ position:absolute; width:60vw; height:60vw; border-radius:50%; filter:blur(90px); opacity:0.14; animation:float linear infinite; }
  .b1{ background: radial-gradient(circle, var(--accent), transparent 70%); top:-10%; left:-10%; animation-duration:34s; }
  .b2{ background: radial-gradient(circle, var(--accent-2), transparent 70%); bottom:-15%; right:-10%; animation-duration:40s; }
  @keyframes float{ 0%{transform:translate(0,0);} 50%{transform:translate(4%,6%);} 100%{transform:translate(0,0);} }
  @media (prefers-reduced-motion: reduce){ .blob{ animation:none; } }

  /* ---------------- App shell ---------------- */
  .app-shell{ display:flex; min-height:100vh; }

  .sidebar{
    width:var(--sidebar-w); flex-shrink:0; background:var(--bg-elevated);
    border-right:1px solid var(--glass-border); height:100vh; position:sticky; top:0;
    display:flex; flex-direction:column; overflow-y:auto; z-index:40;
  }
  .sidebar-brand{ padding:20px 18px 12px; display:flex; align-items:center; gap:10px; }
  .sidebar-brand .dot{ width:32px;height:32px;border-radius:9px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); display:flex;align-items:center;justify-content:center; font-family:var(--font-mono); font-weight:700; font-size:12px; overflow:hidden; flex-shrink:0; }
  .sidebar-brand .dot img{ width:100%; height:100%; object-fit:cover; }
  .sidebar-brand .dot.editable{ cursor:pointer; }
  .sidebar-brand .who{ font-family:var(--font-display); font-weight:700; font-size:14.5px; line-height:1.25; }
  .sidebar-brand .sub{ font-size:10.5px; color:var(--ink-faint); }
  .sidebar-header{ padding:14px 18px 6px; font-family:var(--font-mono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint); }
  .sidebar-scroll{ flex:1; overflow-y:auto; padding-bottom:16px; }

  .sb-row{ display:flex; align-items:center; gap:6px; padding:8px 10px; margin:1px 8px; border-radius:9px; cursor:pointer; font-size:13.5px; color:var(--ink-soft); }
  .sb-row:hover{ background: rgba(255,255,255,0.05); color:var(--ink); }
  .sb-row.active{ background: rgba(74,108,247,0.16); color:#fff; }
  .sb-chev{ width:14px; text-align:center; font-size:10px; color:var(--ink-faint); flex-shrink:0; cursor:pointer; transition:transform .15s; }
  .sb-chev.open{ transform:rotate(90deg); }
  .sb-dot-color{ width:8px;height:8px;border-radius:50%; flex-shrink:0; }
  .sb-label{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sb-label-input{
    flex:1; min-width:0; background:rgba(255,255,255,0.07); border:1px solid var(--accent);
    border-radius:6px; padding:2px 6px; font-size:13px; color:var(--ink); font-family:var(--font-body);
  }
  .sb-actions{ display:none; gap:2px; flex-shrink:0; }
  .sb-row:hover .sb-actions{ display:flex; }
  .sb-mini-btn{ width:20px;height:20px; border-radius:5px; border:none; background:transparent; color:var(--ink-faint); font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .sb-mini-btn:hover{ background:rgba(255,255,255,0.1); color:var(--ink); }
  .sb-mini-btn.danger:hover{ background:rgba(255,92,77,0.18); color:var(--danger); }
  .sb-children{ overflow:hidden; }
  .sb-add-root{ margin:10px 18px 6px; font-size:12px; padding:8px 10px; }

  .sidebar-toggle{ display:flex; }
  .sidebar-backdrop{ display:none; }
  body.sidebar-collapsed .sidebar{ width:0; border:none; opacity:0; pointer-events:none; }
  .sidebar{ transition: width .22s ease, opacity .18s ease, transform .25s ease; }

  @media (max-width: 860px){
    .sidebar{ position:fixed; left:0; top:0; height:100vh; transform:translateX(-100%); transition:transform .25s ease; box-shadow:0 0 40px rgba(0,0,0,0.5); }
    .sidebar.open{ transform:translateX(0); }
    .sidebar-toggle{ display:flex; }
    .sidebar-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:35; }
    .sidebar-backdrop.show{ display:block; }
  }

  .main-area{ flex:1; min-width:0; display:flex; flex-direction:column; }
  .topbar{
    position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:10px;
    padding:12px 20px; background:rgba(6,6,7,0.75); backdrop-filter:blur(16px); border-bottom:1px solid var(--glass-border);
  }
  .icon-btn{
    width:36px;height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center;
    border:none; cursor:pointer; background: rgba(255,255,255,0.07); color:var(--ink-soft); font-size:15px; flex-shrink:0;
  }
  .icon-btn:hover{ background: rgba(255,255,255,0.14); color:var(--ink); }
  .search-input{
    flex:1; border-radius:10px; border:1px solid var(--glass-border);
    padding:9px 13px; font-size:13.5px; font-family:var(--font-body);
    background: rgba(255,255,255,0.05); color:var(--ink);
  }
  .search-input:focus{ outline:none; border-color:var(--accent); }
  .search-input::placeholder{ color:var(--ink-faint); }

  .content-wrap{ max-width:900px; width:100%; margin:0 auto; padding:24px 20px 140px; flex:1; }

  /* ---------------- Breadcrumb + scrollable sibling chips ---------------- */
  .crumb{ font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); margin-bottom:10px; }
  .crumb span{ cursor:pointer; }
  .crumb span:hover{ color:var(--ink); }
  .chip-scroll{ display:flex; gap:8px; overflow-x:auto; padding:2px 2px 12px; scrollbar-width:thin; }
  .chip-scroll::-webkit-scrollbar{ height:6px; }
  .sib-chip{
    flex-shrink:0; padding:7px 14px; border-radius:999px; font-size:12.5px; font-weight:600;
    background: rgba(255,255,255,0.06); border:1px solid var(--glass-border); color:var(--ink-soft); cursor:pointer; white-space:nowrap;
  }
  .sib-chip.active{ background: var(--accent); color:#fff; border-color:transparent; }

  .section-title{ font-family:var(--font-display); font-weight:700; font-size:16px; margin:26px 0 12px; display:flex; align-items:center; gap:8px; }
  .section-title .count{ font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); background:rgba(255,255,255,0.06); padding:2px 9px; border-radius:999px; }

  /* ---------------- Entry cards (inline expand) ---------------- */
  .entry-card{ margin-bottom:12px; padding:16px; cursor:pointer; }
  .entry-top{ display:flex; align-items:flex-start; gap:10px; }
  .entry-tag{ display:inline-block; font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:.03em; padding:3px 9px; border-radius:999px; color:#fff; margin-bottom:6px; }
  .entry-title{ font-family:var(--font-display); font-weight:700; font-size:16px; margin:0 0 4px; }
  .entry-date{ font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); }
  .entry-req-preview{ font-size:13px; color:var(--ink-soft); margin-top:8px; line-height:1.5; }
  .chev{ color:var(--ink-faint); font-size:18px; transition:transform .2s; flex-shrink:0; margin-top:2px; }
  .entry-card.expanded .chev{ transform:rotate(90deg); }
  .entry-thumbs{ display:flex; gap:6px; margin-top:12px; }
  .entry-thumb{ width:44px;height:44px; border-radius:8px; object-fit:cover; border:1px solid var(--glass-border); }
  .entry-thumb-more{ width:44px;height:44px; border-radius:8px; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--ink-soft); }

  .entry-detail{ max-height:0; overflow:hidden; transition:max-height .25s ease; }
  .entry-card.expanded .entry-detail{ max-height:4000px; }
  .entry-detail-inner{ padding-top:16px; margin-top:14px; border-top:1px solid var(--glass-border); }
  .detail-sub{ margin-bottom:16px; }
  .detail-label{ font-family:var(--font-mono); font-size:10.5px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; margin-bottom:5px; display:flex; align-items:center; gap:6px; }
  .dash{ width:12px; height:2px; border-radius:2px; }
  .detail-text{ font-size:13.5px; line-height:1.6; color:var(--ink-soft); white-space:pre-wrap; }
  .detail-gallery{ display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:8px; }
  .detail-gallery img{ width:100%; height:90px; object-fit:cover; border-radius:10px; cursor:zoom-in; border:1px solid var(--glass-border); }
  .entry-detail-actions{ display:flex; gap:10px; margin-top:6px; }

  .btn{ padding:10px 16px; border-radius:12px; border:none; cursor:pointer; font-family:var(--font-body); font-weight:600; font-size:13.5px; }
  .btn-primary{ background: linear-gradient(135deg,var(--accent),var(--accent-2)); color:#fff; }
  .btn-ghost{ background: rgba(255,255,255,0.08); color:var(--ink-soft); }
  .btn-danger-ghost{ background: rgba(255,92,77,0.12); color:var(--danger); }
  .btn-sm{ padding:6px 12px; font-size:12px; border-radius:9px; }

  .empty-state{ text-align:center; padding:60px 20px; color:var(--ink-faint); }
  .empty-state .big{ font-size:34px; margin-bottom:10px; }
  .empty-state p{ font-size:13.5px; max-width:380px; margin:6px auto 0; }

  .fab{
    position:fixed; right:24px; bottom:24px; width:56px;height:56px; border-radius:50%;
    background: linear-gradient(135deg,var(--accent),var(--accent-2)); color:#fff; font-size:26px; border:none;
    box-shadow:0 10px 30px rgba(74,108,247,0.45); cursor:pointer; z-index:30;
  }

  /* ---------------- Home / resume page ---------------- */
  .hero-name{ font-family:var(--font-display); font-weight:700; font-size:clamp(26px,4.5vw,38px); margin:0; }
  .hero-headline{ font-size:15px; color:var(--accent-2); font-weight:600; margin:6px 0 14px; }
  .hero-about{ font-size:14px; line-height:1.7; color:var(--ink-soft); max-width:680px; }
  .edit-hint{ font-family:var(--font-mono); font-size:10.5px; color:var(--ink-faint); margin-top:14px; }

  .timeline{ margin-top:8px; }
  .tl-item{ position:relative; padding-left:22px; padding-bottom:22px; border-left:2px solid var(--glass-border); }
  .tl-item:last-child{ border-color:transparent; padding-bottom:4px; }
  .tl-item::before{ content:""; position:absolute; left:-6px; top:2px; width:10px;height:10px; border-radius:50%; background:var(--accent); }
  .tl-role{ font-weight:700; font-size:14.5px; }
  .tl-company{ font-size:13px; color:var(--accent-2); margin-top:2px; }
  .tl-period{ font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); margin-top:2px; }
  .tl-desc{ font-size:13px; color:var(--ink-soft); margin-top:8px; line-height:1.6; }
  .tl-remove{ margin-top:8px; }

  .chip-cloud{ display:flex; flex-wrap:wrap; gap:8px; }
  .cloud-chip{ padding:7px 13px; border-radius:999px; background:rgba(255,255,255,0.06); border:1px solid var(--glass-border); font-size:12.5px; color:var(--ink-soft); display:flex; align-items:center; gap:6px; }
  .cloud-chip .x{ cursor:pointer; color:var(--ink-faint); font-size:11px; }
  .cloud-chip .x:hover{ color:var(--danger); }
  .add-chip-input{ padding:7px 13px; border-radius:999px; border:1px dashed var(--glass-border); background:transparent; color:var(--ink); font-size:12.5px; width:150px; }

  /* ---------------- Star ratings ---------------- */
  .star-row{ display:inline-flex; gap:1px; margin-left:2px; }
  .star{ font-size:13px; color:var(--ink-faint); cursor:default; }
  .star.filled{ color:#E0A62A; }
  .star.editable{ cursor:pointer; }
  .star.editable:hover{ transform:scale(1.15); }

  /* ---------------- Section headers (add/rename/delete) ---------------- */
  .sec-header-row{ display:flex; align-items:center; gap:8px; margin:26px 0 12px; }
  .sec-header-row .section-title{ margin:0; flex:1; }
  .sec-tools{ display:flex; gap:4px; }
  .sec-tool-btn{ width:26px;height:26px; border-radius:7px; border:none; background:rgba(255,255,255,0.07); color:var(--ink-faint); font-size:11px; cursor:pointer; }
  .sec-tool-btn:hover{ background:rgba(255,255,255,0.14); color:var(--ink); }
  .sec-tool-btn.danger:hover{ background:rgba(255,92,77,0.18); color:var(--danger); }
  .add-section-bar{ display:flex; gap:10px; margin-top:24px; }

  /* ---------------- Profile photo + contact ---------------- */
  .avatar-lg{ width:76px;height:76px; border-radius:20px; overflow:hidden; background:linear-gradient(135deg,var(--accent),var(--accent-2)); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700; font-size:26px; flex-shrink:0; }
  .avatar-lg img{ width:100%; height:100%; object-fit:cover; }
  .hero-top-row{ display:flex; gap:18px; align-items:flex-start; }
  .avatar-controls{ display:flex; gap:8px; margin-top:8px; }
  .contact-row{ display:flex; gap:8px; align-items:center; margin-bottom:8px; }
  .contact-row input{ flex:1; }
  .contact-link-chip{ padding:7px 13px; border-radius:999px; background:rgba(74,108,247,0.12); border:1px solid rgba(74,108,247,0.3); font-size:12.5px; color:var(--accent); text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
  .stats-strip{ display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }
  .stat-pill{ padding:8px 14px; border-radius:12px; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); font-size:12px; color:var(--ink-soft); }
  .stat-pill b{ color:var(--ink); font-family:var(--font-mono); }

  /* ---------------- Modal / toast ---------------- */
  .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; display:flex; align-items:flex-end; justify-content:center; }
  @media (min-width:700px){ .modal-overlay{ align-items:center; } }
  .modal{ width:100%; max-width:640px; max-height:92vh; overflow-y:auto; padding:22px; border-radius:24px 24px 0 0; }
  @media (min-width:700px){ .modal{ border-radius:22px; margin-bottom:26px; } }
  .modal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .modal-head h2{ font-family:var(--font-display); font-size:19px; margin:0; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); font-weight:700; margin-bottom:6px; }
  .field input, .field textarea, .field select{
    width:100%; padding:10px 13px; border-radius:12px; border:1px solid var(--glass-border);
    background: rgba(255,255,255,0.05); font-family:var(--font-body); font-size:13.5px; color:var(--ink);
  }
  .field input:focus, .field textarea:focus, .field select:focus{ outline:none; border-color:var(--accent); }
  .field textarea{ min-height:80px; resize:vertical; }
  .modal-actions{ display:flex; gap:10px; margin-top:6px; }
  .upload-zone{ border:1.5px dashed var(--glass-border); border-radius:14px; padding:18px; text-align:center; cursor:pointer; background:rgba(255,255,255,0.03); }
  .upload-zone:hover{ background:rgba(255,255,255,0.06); }
  .upload-zone input{ display:none; }
  .img-preview-row{ display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
  .img-preview{ position:relative; width:64px;height:64px; }
  .img-preview img{ width:100%;height:100%; object-fit:cover; border-radius:9px; border:1px solid var(--glass-border); }
  .img-preview .rm{ position:absolute; top:-6px; right:-6px; width:18px;height:18px; border-radius:50%; background:var(--danger); color:#fff; border:none; font-size:11px; cursor:pointer; }

  .lightbox{ position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:300; display:flex; align-items:center; justify-content:center; padding:20px; }
  .lightbox img{ max-width:100%; max-height:100%; border-radius:12px; }
  .lightbox-close{ position:absolute; top:18px; right:18px; width:38px;height:38px; border-radius:50%; background:rgba(255,255,255,0.12); color:#fff; border:none; font-size:17px; cursor:pointer; }

  .toast{ position:fixed; bottom:100px; left:50%; transform:translateX(-50%); padding:10px 18px; border-radius:999px; color:#fff; background:rgba(20,20,24,0.95); font-size:12.5px; z-index:400; border:1px solid var(--glass-border); }

  .loading-veil{ position:fixed; inset:0; background:var(--bg); z-index:500; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; }
  .spinner{ width:26px;height:26px; border:3px solid rgba(255,255,255,0.15); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="bg-scene"><div class="blob b1"></div><div class="blob b2"></div></div>
<div id="loadingVeil" class="loading-veil">
  <div class="spinner"></div>
  <div style="font-family:var(--font-mono); font-size:12px; color:#9A9DA6;">loading your workspace…</div>
</div>

<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand" id="sidebarBrand"></div>
    <div class="sb-row" id="homeRow" data-view="home" style="margin:4px 8px;">
      <span style="width:14px;"></span><span class="sb-label">🏠 Home</span>
    </div>
    <div class="sidebar-header">SAP Modules</div>
    <div class="sidebar-scroll">
      <div id="moduleTree"></div>
      <button class="btn btn-ghost sb-add-root" id="addModuleBtn">+ Add module</button>
    </div>
  </aside>

  <div class="main-area">
    <div class="topbar">
      <button class="icon-btn sidebar-toggle" id="sidebarToggle">☰</button>
      <input class="search-input" id="searchInput" placeholder="Search entries, tcodes, keywords…" style="display:none;">
      <div style="flex:1;" id="topbarSpacer"></div>
      <button class="icon-btn" id="backupBtn" title="Backup / restore / publish">⇅</button>
    </div>
    <div class="content-wrap" id="contentWrap"></div>
  </div>
</div>

<button class="fab" id="fabAdd" title="Add entry" style="display:none;">+</button>

<script>
/* ==========================================================================
   STORAGE HELPERS — plain browser localStorage, no backend, no account.
   ========================================================================== */
const NS = "sdlog:";
async function safeGet(key){ try{ return localStorage.getItem(NS+key); }catch(e){ return null; } }
async function safeSet(key, value){
  try{ localStorage.setItem(NS+key, value); return true; }
  catch(e){ if(e && e.name==="QuotaExceededError") toast("Storage full — export a backup, then remove/shrink screenshots."); return false; }
}
async function safeDelete(key){ try{ localStorage.removeItem(NS+key); return true; }catch(e){ return false; } }
async function safeList(prefix){
  try{
    const keys = [];
    for(let i=0;i<localStorage.length;i++){ const full = localStorage.key(i); if(full && full.startsWith(NS+prefix)) keys.push(full.slice(NS.length)); }
    return keys;
  }catch(e){ return []; }
}
function estimateStorageBytes(){
  let total=0;
  for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k && k.startsWith(NS)) total += (k.length + (localStorage.getItem(k)||"").length); }
  return total;
}

   LOAD + MIGRATION (from the old flat "Phases" model, if present)
   ========================================================================== */
async function tryLoadPublishedData(){
  try{ const res = await fetch("./data.json", {cache:"no-store"}); if(!res.ok) return null; return await res.json(); }
  catch(e){ return null; }
}

async function loadAll(){
  const hasNewData = await safeGet("sd-modules");
  const entryKeysExisting = await safeList("entry:");

  if(!hasNewData && entryKeysExisting.length===0){
    const published = await tryLoadPublishedData();
    if(published){
      if(published.home) await safeSet("sd-home", JSON.stringify(published.home));
      if(published.modules) await safeSet("sd-modules", JSON.stringify(published.modules));
      if(published.topics) await safeSet("sd-topics", JSON.stringify(published.topics));
      if(Array.isArray(published.entries)){
        for(const entry of published.entries) await safeSet("entry:"+entry.id, JSON.stringify(entry));
      }
    }
  }

  // Migrate legacy sd-phases (flat "Phases") into a "SAP SD" module + topics
  const legacyPhasesRaw = await safeGet("sd-phases");
  const modulesRaw = await safeGet("sd-modules");
  if(legacyPhasesRaw && !modulesRaw){
    const legacyPhases = JSON.parse(legacyPhasesRaw);
    const sapsd = {id:"sapsd", name:"SAP SD"};
    MODULES = [sapsd];
    TOPICS = legacyPhases.map(p => ({id:p.id, moduleId:"sapsd", parentId:null, name:p.name, color:p.color||"#4A6CF7"}));
    await safeSet("sd-modules", JSON.stringify(MODULES));
    await safeSet("sd-topics", JSON.stringify(TOPICS));
    const keys = await safeList("entry:");
    for(const k of keys){
      const raw = await safeGet(k);
      if(!raw) continue;
      const entry = JSON.parse(raw);
      if(entry.phaseId && !entry.topicId){ entry.topicId = entry.phaseId; delete entry.phaseId; await safeSet(k, JSON.stringify(entry)); }
    }
    await safeDelete("sd-phases");
  }

  const homeRaw = await safeGet("sd-home");
  HOME = homeRaw ? JSON.parse(homeRaw) : JSON.parse(JSON.stringify(DEFAULT_HOME));
  if(!HOME.sections){
    HOME.sections = [
      {id:"experience", title:"Experience", type:"timeline", items: HOME.experience || []},
      {id:"skills", title:"Skills", type:"chips", showRating:true, items:(HOME.skills||[]).map(name=>({name, rating:0}))},
      {id:"certifications", title:"Certifications", type:"chips", showRating:false, items:(HOME.certifications||[]).map(name=>({name}))},
      {id:"interests", title:"Interests", type:"chips", showRating:false, items:(HOME.interests||[]).map(name=>({name}))}
    ];
    delete HOME.experience; delete HOME.skills; delete HOME.certifications; delete HOME.interests;
  }
  if(HOME.photo===undefined) HOME.photo = null;
  if(!HOME.contact) HOME.contact = [];
  await safeSet("sd-home", JSON.stringify(HOME));

  const modRaw = await safeGet("sd-modules");
  if(modRaw){
    MODULES = JSON.parse(modRaw);
  } else if(MODULES.length===0){
    MODULES = [{id:"sapsd", name:"SAP SD"}];
    await safeSet("sd-modules", JSON.stringify(MODULES));
  }

  const topRaw = await safeGet("sd-topics");
  if(topRaw){ TOPICS = JSON.parse(topRaw); }

  const keys = await safeList("entry:");
  const loaded = [];
  for(const k of keys){ const raw = await safeGet(k); if(raw){ try{ loaded.push(JSON.parse(raw)); }catch(e){} } }
  loaded.sort((a,b) => (b.date||"").localeCompare(a.date||"") || (b.createdAt||0)-(a.createdAt||0));
  ENTRIES = loaded;

  // default open the first module
  if(MODULES[0]) openNodes.add("module:"+MODULES[0].id);
}

async function persistModulesTopics(){
  await safeSet("sd-modules", JSON.stringify(MODULES));
  await safeSet("sd-topics", JSON.stringify(TOPICS));
}

/* ==========================================================================
   TREE HELPERS
   ========================================================================== */
function topicChildren(moduleId, parentId){
  return TOPICS.filter(t => t.moduleId===moduleId && (t.parentId||null)===(parentId||null));
}
function topicById(id){ return TOPICS.find(t => t.id===id); }
function moduleById(id){ return MODULES.find(m => m.id===id); }
function descendantTopicIds(topicId){
  const ids = [topicId];
  const kids = TOPICS.filter(t => t.parentId===topicId);
  kids.forEach(k => ids.push(...descendantTopicIds(k.id)));
  return ids;
}
function moduleTopicIds(moduleId){ return TOPICS.filter(t => t.moduleId===moduleId).map(t => t.id); }
function topicPath(topicId){
  const path = [];
  let t = topicById(topicId);
  while(t){ path.unshift(t); t = t.parentId ? topicById(t.parentId) : null; }
  return path;
}

async function handleTreeAction(btn){
  const action = btn.dataset.action;
  if(action==="add-topic"){
    const moduleId = btn.dataset.module, parentId = btn.dataset.parent || null;
    const id = "t"+Date.now();
    TOPICS.push({id, moduleId, parentId, name:"New topic", color: PALETTE[TOPICS.length % PALETTE.length]});
    if(parentId) openNodes.add("topic:"+parentId); else openNodes.add("module:"+moduleId);
    await persistModulesTopics();
    renderSidebar();
    startInlineRename("topic:"+id);
  } else if(action==="rename-module"){
    startInlineRename("module:"+btn.dataset.id);
  } else if(action==="rename-topic"){
    startInlineRename("topic:"+btn.dataset.id);
  } else if(action==="delete-module"){
    if(MODULES.length<=1){ toast("You need at least one module"); return; }
    const mid = btn.dataset.id;
    const topicIds = moduleTopicIds(mid);
    const count = ENTRIES.filter(e => topicIds.includes(e.topicId)).length;
    const msg = count>0 ? `Delete this module? ${count} ${count===1?'entry':'entries'} inside it will also be deleted.` : "Delete this module?";
    if(!confirm(msg)) return;
    for(const e of ENTRIES.filter(e => topicIds.includes(e.topicId))) await safeDelete("entry:"+e.id);
    ENTRIES = ENTRIES.filter(e => !topicIds.includes(e.topicId));
    TOPICS = TOPICS.filter(t => t.moduleId!==mid);
    MODULES = MODULES.filter(m => m.id!==mid);
    if(selection.type==="module" && selection.id===mid) selection = {type:"home"};
    await persistModulesTopics();
    renderSidebar(); renderMain();
  } else if(action==="delete-topic"){
    const tid = btn.dataset.id;
    const ids = descendantTopicIds(tid);
    const count = ENTRIES.filter(e => ids.includes(e.topicId)).length;
    const msg = count>0 ? `Delete this topic and its sub-branches? ${count} ${count===1?'entry':'entries'} inside will also be deleted.` : "Delete this topic and its sub-branches?";
    if(!confirm(msg)) return;
    for(const e of ENTRIES.filter(e => ids.includes(e.topicId))) await safeDelete("entry:"+e.id);
    ENTRIES = ENTRIES.filter(e => !ids.includes(e.topicId));
    TOPICS = TOPICS.filter(t => !ids.includes(t.id));
    if(selection.type==="topic" && ids.includes(selection.id)) selection = {type:"home"};
    await persistModulesTopics();
    renderSidebar(); renderMain();
  }
}

function startInlineRename(key){
  const el = document.querySelector(`[data-nodename="${key}"]`);
  if(!el) return;
  const [kind,id] = key.split(":");
  const current = kind==="module" ? moduleById(id).name : topicById(id).name;
  const input = document.createElement("input");
  input.className = "sb-label-input";
  input.value = current;
  el.replaceWith(input);
  input.focus(); input.select();
  const commit = async () => {
    const val = input.value.trim() || "Untitled";
    if(kind==="module") moduleById(id).name = val; else topicById(id).name = val;
    await persistModulesTopics();
    renderSidebar();
  };
  input.addEventListener("blur", commit);
  input.addEventListener("keydown", (ev) => { if(ev.key==="Enter") input.blur(); });
}

        sec.items.push(sec.showRating ? {name:el.value.trim(), rating:3} : {name:el.value.trim()});
        await safeSet("sd-home", JSON.stringify(HOME));
        renderMain();
      }
    });
  });
  document.querySelectorAll("[data-star-sec]").forEach(el => {
    el.addEventListener("click", async () => {
      const sec = HOME.sections.find(s=>s.id===el.dataset.starSec);
      const item = sec.items[el.dataset.starItem];
      item.rating = parseInt(el.dataset.starVal);
      await safeSet("sd-home", JSON.stringify(HOME));
      renderMain();
    });
  });
  document.querySelectorAll("[data-toggle-rating]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const sec = HOME.sections.find(s=>s.id===btn.dataset.toggleRating);
      sec.showRating = !sec.showRating;
      if(sec.showRating) sec.items.forEach(it => { if(it.rating===undefined) it.rating = 3; });
      await safeSet("sd-home", JSON.stringify(HOME));
      renderMain();
    });
  });
  document.querySelectorAll("[data-delete-section]").forEach(btn => {
    btn.addEventListener("click", async () => {
      if(!confirm("Delete this section and everything in it?")) return;
      HOME.sections = HOME.sections.filter(s => s.id!==btn.dataset.deleteSection);
      await safeSet("sd-home", JSON.stringify(HOME));
      renderMain();
    });
  });
  const addSectionBtn = document.getElementById("addSectionBtn");
  if(addSectionBtn) addSectionBtn.addEventListener("click", openAddSectionModal);

  /* contact links */
  document.querySelectorAll("[data-contact]").forEach(el => {
    el.addEventListener("blur", async () => {
      HOME.contact[el.dataset.contact][el.dataset.cfield] = el.value.trim();
      await safeSet("sd-home", JSON.stringify(HOME));
    });
  });
  document.querySelectorAll("[data-remove-contact]").forEach(btn => {
    btn.addEventListener("click", async () => {
      HOME.contact.splice(btn.dataset.removeContact,1);
      await safeSet("sd-home", JSON.stringify(HOME));
      renderMain();
    });
  });
  const addContactBtn = document.getElementById("addContactBtn");
  if(addContactBtn) addContactBtn.addEventListener("click", async () => {
    HOME.contact.push({label:"", url:""});
    await safeSet("sd-home", JSON.stringify(HOME));
    renderMain();
  });

  /* avatar */
  const avatarInput = document.getElementById("avatarInput");
  const triggerAvatar = () => avatarInput && avatarInput.click();
  const avatarClick = document.getElementById("avatarClick");
  if(avatarClick && EDIT_MODE) avatarClick.addEventListener("click", triggerAvatar);
  const changePhotoBtn = document.getElementById("changePhotoBtn");
  if(changePhotoBtn) changePhotoBtn.addEventListener("click", triggerAvatar);
  const removePhotoBtn = document.getElementById("removePhotoBtn");
  if(removePhotoBtn) removePhotoBtn.addEventListener("click", async () => {
    HOME.photo = null;
    await safeSet("sd-home", JSON.stringify(HOME));
    renderSidebarBrand();
    renderMain();
  });
  if(avatarInput) avatarInput.addEventListener("change", handleAvatarSelect);
}

function handleAvatarSelect(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e2) => {
    const img = new Image();
    img.onload = async () => {
      const maxDim = 300;
      let w = img.width, h = img.height;
      if(w>maxDim || h>maxDim){ const scale = maxDim/Math.max(w,h); w*=scale; h*=scale; }
      const canvas = document.createElement("canvas"); canvas.width=w; canvas.height=h;
      const ctx = canvas.getContext("2d"); ctx.drawImage(img,0,0,w,h);
      HOME.photo = canvas.toDataURL("image/jpeg",0.85);
      await safeSet("sd-home", JSON.stringify(HOME));
      renderSidebarBrand();
      renderMain();
      toast("Photo updated");
    };
    img.src = e2.target.result;
  };
  reader.readAsDataURL(file);
  ev.target.value = "";
}

/* ---------------- TOPIC / MODULE VIEW ---------------- */
function currentTopicIds(){
  if(selection.type==="module") return moduleTopicIds(selection.id);
  if(selection.type==="topic") return descendantTopicIds(selection.id);
  return [];
}
function matchesSearch(e){
  if(!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  return [e.title,e.tcodes,e.businessReq,e.config,e.testEvidence,e.lessons,e.errors].some(f => (f||"").toLowerCase().includes(q));
}

function renderTopicViewHtml(){
  let heading, ids, siblingChips = "", crumbHtml = "";
  if(selection.type==="module"){
    const m = moduleById(selection.id);
    heading = m ? m.name : "Module";
    ids = moduleTopicIds(selection.id);
    const topLevel = topicChildren(selection.id, null);
    if(topLevel.length){
      siblingChips = `<div class="chip-scroll">` + topLevel.map(t => `<div class="sib-chip" data-jump="topic:${t.id}">${escapeHtml(t.name)}</div>`).join("") + `</div>`;
    }
    crumbHtml = `<div class="crumb"><span data-jump="home">Home</span> / ${escapeHtml(heading)}</div>`;
  } else {
    const t = topicById(selection.id);
    heading = t ? t.name : "Topic";
    ids = descendantTopicIds(selection.id);
    const path = topicPath(selection.id);
    const mod = moduleById(t.moduleId);
    crumbHtml = `<div class="crumb"><span data-jump="home">Home</span> / <span data-jump="module:${mod.id}">${escapeHtml(mod.name)}</span>` +
      path.map((p,i) => ` / <span data-jump="topic:${p.id}">${escapeHtml(p.name)}</span>`).join("") + `</div>`;
    const siblings = t.parentId ? TOPICS.filter(x => x.parentId===t.parentId) : topicChildren(t.moduleId, null);
    const children = TOPICS.filter(x => x.parentId===t.id);
    const showList = children.length ? children : siblings;
    if(showList.length){
      siblingChips = `<div class="chip-scroll">` + showList.map(x => `<div class="sib-chip ${x.id===selection.id?'active':''}" data-jump="topic:${x.id}">${escapeHtml(x.name)}</div>`).join("") + `</div>`;
    }
  }

  const list = ENTRIES.filter(e => ids.includes(e.topicId) && matchesSearch(e));
  const feedHtml = renderFeedHtml(list);

  return `
    ${crumbHtml}
    <div class="section-title" style="margin-top:2px;">${escapeHtml(heading)}</div>
    ${siblingChips}
    <div id="feedContainer">${feedHtml}</div>
  `;
}

function wireTopicViewEvents(){
  document.querySelectorAll("[data-jump]").forEach(el => {

      const val = el.dataset.jump;

      else { const [kind,id] = val.split(":"); selection = {type:kind, id}; }
      renderMain(); renderSidebar();

  wireFeedEvents();
}

function renderFeedHtml(list){
  if(ENTRIES.length===0 || list.length===0){
    const msg = (list.length===0 && searchQuery) ? "No entries match your search." : "Nothing logged here yet.";
    return `<div class="empty-state glass"><div class="big">🫧</div><p>${msg}${EDIT_MODE?" Tap the + button to add your first entry.":""}</p></div>`;
  }
  return `<div class="section-title"><span class="count">${list.length} ${list.length===1?'entry':'entries'}</span></div>` +
    list.map(e => renderEntryCard(e)).join("");
}

function renderEntryCard(e){

  return `
    <div class="entry-card glass ${isExpanded?'expanded':''}" data-id="${e.id}">

          <div class="entry-title">${escapeHtml(e.title||"Untitled entry")}</div>
          <div class="entry-date">${formatDate(e.date)}${e.tcodes ? " · "+escapeHtml(e.tcodes) : ""}</div>
          ${e.businessReq ? `<div class="entry-req-preview">${escapeHtml(truncate(e.businessReq,140))}</div>` : ""}
          ${imgs.length ? `<div class="entry-thumbs">${thumbHtml}</div>` : ""}
        </div>
        <span class="chev">›</span>
      </div>
      <div class="entry-detail">
        <div class="entry-detail-inner">
          ${e.businessReq ? sec("Business Requirement", e.businessReq, "#4A6CF7") : ""}
          ${e.config ? sec("Configuration Performed", e.config, "#E0A62A") : ""}
          ${gallery ? `<div class="detail-sub"><div class="detail-label" style="color:#9A9DA6;"><span class="dash" style="background:#9A9DA6;"></span>Screenshots</div><div class="detail-gallery">${gallery}</div></div>` : ""}
          ${e.testEvidence ? sec("Test Evidence", e.testEvidence, "#22C1A0") : ""}
          ${e.lessons ? sec("Lessons Learned", e.lessons, "#3E7A9E") : ""}
          ${e.errors ? sec("Notes & Fixes", e.errors, "#E0563F") : ""}
          ${EDIT_MODE ? `<div class="entry-detail-actions">
            <button class="btn btn-ghost btn-sm" data-edit-entry="${e.id}">Edit entry</button>
            <button class="btn btn-danger-ghost btn-sm" data-delete-entry="${e.id}">Delete</button>
          </div>` : ""}

function sec(label, text, color){

function truncate(s,n){ return s.length>n ? s.slice(0,n).trim()+"…" : s; }
function formatDate(d){ if(!d) return ""; const dt = new Date(d+"T00:00:00"); if(isNaN(dt)) return d; return dt.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"}); }
function escapeHtml(s){ return (s==null?"":String(s)).replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

async function deleteEntry(id){
  if(!confirm("Delete this entry? This can't be undone.")) return;
  await safeDelete("entry:"+id);
  ENTRIES = ENTRIES.filter(e => e.id!==id);
  if(expandedEntryId===id) expandedEntryId = null;
  renderMain();
  toast("Entry deleted");
}

function flatTopicOptions(){
  const opts = [];
  MODULES.forEach(m => {
    opts.push({id:"", label:`— ${m.name} —`, disabled:true});
    const walk = (parentId, depth) => {
      topicChildren(m.id, parentId).forEach(t => {
        opts.push({id:t.id, label:"\u3000".repeat(depth) + t.name, disabled:false});
        walk(t.id, depth+1);
      });
    };
    walk(null, 1);
  });
  return opts;
}

function openForm(existingId){
  editingEntryId = existingId || null;
  const e = editingEntryId ? ENTRIES.find(x=>x.id===editingEntryId) : null;
  pendingImages = e ? (e.images||[]).slice() : [];
  const defaultTopicId = e ? e.topicId : (selection.type==="topic" ? selection.id : (TOPICS.find(t=>t.moduleId===selection.id) || {}).id);

  const options = flatTopicOptions().map(o => `<option value="${o.id}" ${o.disabled?'disabled':''} ${o.id===defaultTopicId?'selected':''}>${escapeHtml(o.label)}</option>`).join("");

  showModal(`
    <div class="modal-head"><h2>${e ? "Edit entry" : "Log a new entry"}</h2><button class="icon-btn" onclick="closeModal()">✕</button></div>
    <div class="field"><label>Topic</label><select id="fTopic">${options}</select></div>
    <div class="field"><label>Title</label><input type="text" id="fTitle" placeholder="e.g. Configured Pricing Procedure Determination" value="${e?escapeHtml(e.title):""}"></div>
    <div class="field" style="display:flex; gap:12px;">
      <div style="flex:1;"><label>Date</label><input type="date" id="fDate" value="${e?e.date:new Date().toISOString().slice(0,10)}"></div>
      <div style="flex:1;"><label>T-Codes (optional)</label><input type="text" id="fTcodes" placeholder="VOV8, VK11…" value="${e?escapeHtml(e.tcodes||""):""}"></div>
    </div>
    <div class="field"><label>Business Requirement</label><textarea id="fReq" placeholder="What did the business ask for?">${e?escapeHtml(e.businessReq||""):""}</textarea></div>
    <div class="field"><label>Configuration Performed</label><textarea id="fConfig" placeholder="Steps you took, IMG paths, settings changed…">${e?escapeHtml(e.config||""):""}</textarea></div>
    <div class="field">
      <label>Screenshots</label>
      <div class="upload-zone" id="uploadZone">
        <div style="font-size:20px;">📎</div>
        <div style="font-size:12px;color:var(--ink-soft);margin-top:4px;">Tap to upload screenshots (auto-compressed)</div>
        <input type="file" id="fileInput" accept="image/*" multiple>
      </div>
      <div class="img-preview-row" id="imgPreviewRow"></div>
    </div>
    <div class="field"><label>Test Evidence</label><textarea id="fTest" placeholder="What did you test, and what happened?">${e?escapeHtml(e.testEvidence||""):""}</textarea></div>
    <div class="field"><label>Lessons Learned</label><textarea id="fLessons" placeholder="What would you tell yourself next time?">${e?escapeHtml(e.lessons||""):""}</textarea></div>
    <div class="field"><label>Notes & Fixes</label><textarea id="fErrors" placeholder="Anything worth remembering">${e?escapeHtml(e.errors||""):""}</textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="saveEntryBtn">${e?"Save changes":"Save entry"}</button>
    </div>
  `);

  renderImgPreviews();
  document.getElementById("uploadZone").addEventListener("click", () => document.getElementById("fileInput").click());
  document.getElementById("fileInput").addEventListener("change", handleFileSelect);

  document.getElementById("saveEntryBtn").addEventListener("click", async () => {
    const title = document.getElementById("fTitle").value.trim();
    const topicId = document.getElementById("fTopic").value;
    if(!title){ toast("Give the entry a title first"); return; }
    if(!topicId){ toast("Pick a topic first"); return; }
    const btn = document.getElementById("saveEntryBtn"); btn.disabled = true; btn.textContent = "Saving…";

    const entry = {
      id: editingEntryId || ("e"+Date.now()),
      topicId,
      title,
      date: document.getElementById("fDate").value || new Date().toISOString().slice(0,10),
      tcodes: document.getElementById("fTcodes").value.trim(),
      businessReq: document.getElementById("fReq").value.trim(),
      config: document.getElementById("fConfig").value.trim(),
      testEvidence: document.getElementById("fTest").value.trim(),
      lessons: document.getElementById("fLessons").value.trim(),
      errors: document.getElementById("fErrors").value.trim(),
      images: pendingImages.slice(),
      createdAt: (editingEntryId && e && e.createdAt) || Date.now()
    };
    const ok = await safeSet("entry:"+entry.id, JSON.stringify(entry));
    btn.disabled = false;
    if(!ok){ toast("Save failed — try again"); return; }

    const idx = ENTRIES.findIndex(x => x.id===entry.id);
    if(idx>=0) ENTRIES[idx] = entry; else ENTRIES.unshift(entry);
    ENTRIES.sort((a,b) => (b.date||"").localeCompare(a.date||"") || (b.createdAt||0)-(a.createdAt||0));

    // jump to the entry's topic, expand it inline, scroll to it — no popup
    selection = {type:"topic", id:topicId};
    expandedEntryId = entry.id;
    closeModal();
    renderSidebar();
    renderMain();
    setTimeout(() => {
      const card = document.querySelector(`[data-id="${entry.id}"]`);
      if(card) card.scrollIntoView({behavior:"smooth", block:"start"});
    }, 60);
    toast(editingEntryId ? "Entry updated" : "Entry saved");
  });
}

function renderImgPreviews(){
  const row = document.getElementById("imgPreviewRow");
  row.innerHTML = pendingImages.map((src,i) => `<div class="img-preview"><img src="${src}"><button class="rm" data-rm="${i}">✕</button></div>`).join("");
  row.querySelectorAll("[data-rm]").forEach(b => b.addEventListener("click", () => { pendingImages.splice(parseInt(b.dataset.rm),1); renderImgPreviews(); }));

function handleFileSelect(ev){
  const files = Array.from(ev.target.files || []);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e2) => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 1400;
        let w = img.width, h = img.height;
        if(w>maxDim || h>maxDim){ const scale = maxDim/Math.max(w,h); w*=scale; h*=scale; }
        const canvas = document.createElement("canvas"); canvas.width=w; canvas.height=h;
        const ctx = canvas.getContext("2d"); ctx.drawImage(img,0,0,w,h);
        pendingImages.push(canvas.toDataURL("image/jpeg",0.62));

    };
    reader.readAsDataURL(file);
  });
  ev.target.value = "";
}

function openBackupModal(){
  const bytes = estimateStorageBytes();
  const kb = (bytes/1024).toFixed(1);
  showModal(`
    <div class="modal-head"><h2>Backup, restore &amp; publish</h2><button class="icon-btn" onclick="closeModal()">✕</button></div>
    <p style="font-size:13px;color:var(--ink-soft);line-height:1.6;">
      Everything is saved in <strong>this browser only</strong>. Publish downloads a
      <code>data.json</code> you commit to your repo root so visitors see your real content.
    </p>
    <div class="glass" style="padding:12px 16px; margin:14px 0; text-align:center;">
      <div style="font-family:var(--font-display); font-weight:700; font-size:18px;">${kb} KB</div>
      <div style="font-size:11px;color:var(--ink-faint);">stored in this browser</div>
    </div>
    <div class="modal-actions" style="flex-direction:column;gap:10px;">
      <button class="btn btn-primary" id="publishBtn" style="width:100%;">🌐 Publish (download data.json)</button>
      <button class="btn btn-ghost" id="exportBtn" style="width:100%;">⬇ Export dated backup (.json)</button>
    </div>
    <div class="field" style="margin-top:18px;">
      <label>Restore from a backup file</label>
      <div class="upload-zone" id="importZone">
        <div style="font-size:20px;">📂</div>
        <div style="font-size:12px;color:var(--ink-soft);margin-top:4px;">Tap to choose a .json backup — replaces everything in this browser</div>
        <input type="file" id="importInput" accept="application/json">
      </div>
    </div>
  `);
  document.getElementById("publishBtn").addEventListener("click", publishData);
  document.getElementById("exportBtn").addEventListener("click", exportBackup);
  document.getElementById("importZone").addEventListener("click", () => document.getElementById("importInput").click());
  document.getElementById("importInput").addEventListener("change", importBackup);
}
function buildPayload(){ return {exportedAt:new Date().toISOString(), home:HOME, modules:MODULES, topics:TOPICS, entries:ENTRIES}; }
function downloadJson(payload, filename){
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
async function publishData(){ downloadJson(buildPayload(), "data.json"); toast("data.json downloaded — replace it in your repo and push"); }
async function exportBackup(){ downloadJson(buildPayload(), `sd-log-backup-${new Date().toISOString().slice(0,10)}.json`); toast("Backup downloaded"); }
function importBackup(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  if(!confirm("This will replace everything currently stored in this browser. Continue?")) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try{
      const data = JSON.parse(e.target.result);
      if(data.home){ HOME = data.home; await safeSet("sd-home", JSON.stringify(HOME)); }
      if(data.modules){ MODULES = data.modules; }
      if(data.topics){ TOPICS = data.topics; }
      await persistModulesTopics();
      if(Array.isArray(data.entries)){
        const existingKeys = await safeList("entry:");
        for(const k of existingKeys) await safeDelete(k);
        for(const entry of data.entries) await safeSet("entry:"+entry.id, JSON.stringify(entry));
        ENTRIES = data.entries.slice().sort((a,b) => (b.date||"").localeCompare(a.date||"") || (b.createdAt||0)-(a.createdAt||0));
      }
      closeModal();
      selection = {type:"home"};
      renderSidebar(); renderMain();
      toast("Backup restored");
    }catch(err){ toast("That file doesn't look like a valid backup"); }
  };
  reader.readAsText(file);
}

/* ==========================================================================
   MODAL / TOAST plumbing
   ========================================================================== */
function showModal(innerHtml){
  closeModal();
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay"; overlay.id = "activeModalOverlay";
  overlay.innerHTML = `<div class="modal glass-strong">${innerHtml}</div>`;
  overlay.addEventListener("click", (ev) => { if(ev.target===overlay) closeModal(); });
  document.body.appendChild(overlay);
}
function closeModal(){ const el = document.getElementById("activeModalOverlay"); if(el) el.remove(); }
window.closeModal = closeModal;
function toast(msg){
  const t = document.createElement("div"); t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 2200);
}

/* ==========================================================================
   INIT
   ========================================================================== */
document.getElementById("backupBtn").addEventListener("click", openBackupModal);
document.getElementById("searchInput").addEventListener("input", (ev) => { searchQuery = ev.target.value; renderMain(); });
if(!EDIT_MODE) document.getElementById("backupBtn").style.display = "none";

(async function init(){
  await loadAll();
  renderSidebarBrand();
  renderSidebar();
  renderMain();
  document.getElementById("loadingVeil").style.display = "none";
})();
</script>
</body>
</html>
